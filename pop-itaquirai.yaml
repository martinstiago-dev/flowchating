        - {color: "#ef4444", level: 0}
        - {color: "#16a34a", level: 1}

  # ===============================
  # TRANSPORTE ⇄ DM4370 - 1G
  # ===============================
  link_transporte_dm_tx:
    dataRef: tx_transporte_dm
    strokeColor:
      thresholds:
        - {color: "#22d3ee", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}
  label_transporte_dm_tx:
    dataRef: tx_transporte_dm
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  link_transporte_dm_rx:
    dataRef: rx_transporte_dm
    strokeColor:
      thresholds:
        - {color: "#64748b", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}
  label_transporte_dm_rx:
    dataRef: rx_transporte_dm
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  # ===============================
  # DM4370 ⇄ OLT - 10G
  # ===============================
  link_dm_olt_tx:
    dataRef: tx_dm_olt
