---
cellIdPreamble: ""
gradientMode: "none"
animationDurationSecs: 2

cells:
  # ============================================================
  # STATUS DOS EQUIPAMENTOS
  # Esperado:
  # 0 = OK / UP
  # 1 = Atenção
  # 2 = Problema / DOWN
  # ============================================================

  node_transporte_box:
    dataRef: status_transporte
    fillColor:
      thresholds:
        - {color: "#0f2744", level: 0}
        - {color: "#92400e", level: 1}
        - {color: "#7f1d1d", level: 2}
    strokeColor:
      thresholds:
        - {color: "#1d4ed8", level: 0}
        - {color: "#f59e0b", level: 1}
        - {color: "#ef4444", level: 2}

  node_transporte_title:
    dataRef: status_transporte
    labelColor:
      thresholds:
        - {color: "#ffffff", level: 0}
        - {color: "#fde68a", level: 1}
        - {color: "#fecaca", level: 2}

  node_dm4370_box:
    dataRef: status_dm4370
    fillColor:
      thresholds:
        - {color: "#0d2218", level: 0}
        - {color: "#422006", level: 1}
        - {color: "#450a0a", level: 2}
    strokeColor:
      thresholds:
        - {color: "#16a34a", level: 0}
        - {color: "#f59e0b", level: 1}
        - {color: "#ef4444", level: 2}

  node_dm4370_title:
    dataRef: status_dm4370
    labelColor:
      thresholds:
        - {color: "#ffffff", level: 0}
        - {color: "#fde68a", level: 1}
        - {color: "#fecaca", level: 2}

  node_olt_box:
    dataRef: status_olt
    fillColor:
      thresholds:
        - {color: "#0d2218", level: 0}
        - {color: "#422006", level: 1}
        - {color: "#450a0a", level: 2}
    strokeColor:
      thresholds:
        - {color: "#16a34a", level: 0}
        - {color: "#f59e0b", level: 1}
        - {color: "#ef4444", level: 2}

  node_olt_title:
    dataRef: status_olt
    labelColor:
      thresholds:
        - {color: "#ffffff", level: 0}
        - {color: "#fde68a", level: 1}
        - {color: "#fecaca", level: 2}

  node_rb750_box:
    dataRef: status_rb750
    fillColor:
      thresholds:
        - {color: "#0d2218", level: 0}
        - {color: "#422006", level: 1}
        - {color: "#450a0a", level: 2}
    strokeColor:
      thresholds:
        - {color: "#16a34a", level: 0}
        - {color: "#f59e0b", level: 1}
        - {color: "#ef4444", level: 2}

  node_rb750_title:
    dataRef: status_rb750
    labelColor:
      thresholds:
        - {color: "#ffffff", level: 0}
        - {color: "#fde68a", level: 1}
        - {color: "#fecaca", level: 2}

  node_loja_box:
    dataRef: status_loja
    fillColor:
      thresholds:
        - {color: "#0d2218", level: 0}
        - {color: "#422006", level: 1}
        - {color: "#450a0a", level: 2}
    strokeColor:
      thresholds:
        - {color: "#16a34a", level: 0}
        - {color: "#f59e0b", level: 1}
        - {color: "#ef4444", level: 2}

  node_loja_title:
    dataRef: status_loja
    labelColor:
      thresholds:
        - {color: "#ffffff", level: 0}
        - {color: "#fde68a", level: 1}
        - {color: "#fecaca", level: 2}

  # ============================================================
  # LINKS PRINCIPAIS
  # Valores esperados em bps vindo do Zabbix.
  # Se seus itens já vêm em bps, mantenha assim.
  # ============================================================

  # TRANSPORTE ALT -> DM4370
  # Capacidade considerada: 1 Gbps
  link_transporte_dm:
    dataRef: tx_transporte_dm
    strokeColor:
      thresholds:
        - {color: "#2dd4bf", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  label_transporte_dm:
    dataRef: tx_transporte_dm
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  # DM4370 -> OLT NOKIA
  # Capacidade considerada: 10 Gbps
  link_dm_olt:
    dataRef: tx_dm_olt
    strokeColor:
      thresholds:
        - {color: "#2dd4bf", level: 0}
        - {color: "#f59e0b", level: 7000000000}
        - {color: "#ef4444", level: 9000000000}

  label_dm_olt:
    dataRef: tx_dm_olt
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 7000000000}
        - {color: "#ef4444", level: 9000000000}

  # OLT -> RB750 CONTAINER
  # Capacidade considerada: 1 Gbps
  link_olt_rb750:
    dataRef: tx_olt_rb750
    strokeColor:
      thresholds:
        - {color: "#2dd4bf", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  label_olt_rb750:
    dataRef: tx_olt_rb750
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  # OLT -> LOJA ITAQUIRAI
  # Capacidade considerada: 1 Gbps
  link_olt_loja:
    dataRef: tx_olt_loja
    strokeColor:
      thresholds:
        - {color: "#2dd4bf", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}

  label_olt_loja:
    dataRef: tx_olt_loja
    label:
      units: "bps"
      decimalPoints: 2
    labelColor:
      thresholds:
        - {color: "#e2e8f0", level: 0}
        - {color: "#f59e0b", level: 700000000}
        - {color: "#ef4444", level: 900000000}
