# POP Itaquiraí - Flow Panel Config
# Gerado para andrewbmchugh-flow-panel

gradientMode: false
animationDurationSecs: 3

cells:

  # ─── NODES ───────────────────────────────────────────

  node_transporte_box:
    label:
      separator: ":"
    dataRef: icmp_transporte
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }      # UP - verde
        - { color: "#ca8a04", level: 0.5 }    # degradado - amarelo
        - { color: "#dc2626", level: 1 }      # DOWN - vermelho

  node_dm4370_box:
    label:
      separator: ":"
    dataRef: icmp_dm
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_olt_box:
    label:
      separator: ":"
    dataRef: icmp_olt
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_rb750_box:
    label:
      separator: ":"
    dataRef: icmp_rb750
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_loja_box:
    label:
      separator: ":"
    dataRef: icmp_loja
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  # ─── LINKS ───────────────────────────────────────────

  link_transporte_dm:
    dataRef: tx_transp
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }         # normal - teal
        - { color: "#ca8a04", level: 700000000 }  # 700 Mbps - amarelo
        - { color: "#dc2626", level: 900000000 }  # 900 Mbps - vermelho

  link_dm_olt:
    dataRef: tx_dm_olt
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 7000000000 }  # 7 Gbps
        - { color: "#dc2626", level: 9000000000 }  # 9 Gbps

  link_olt_rb750:
    dataRef: tx_olt_rb
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  link_olt_loja:
    dataRef: tx_olt_loja
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  # ─── LABELS ──────────────────────────────────────────

  label_transporte_dm:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_transp, rx_transp]

  label_dm_olt:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_dm_olt, rx_dm_olt]

  label_olt_rb750:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_rb, rx_olt_rb]

  label_olt_loja:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_loja, rx_olt_loja]

# ─── DATA MAPPINGS ─────────────────────────────────────
# Mapeie os refIds do Zabbix para os dataRefs acima

dataRefs:
  tx_transp:    { refId: C }   # DM4370 ten-gig-1/1/4 Bits sent (TRANSP TX)
  rx_transp:    { refId: D }   # DM4370 ten-gig-1/1/4 Bits received (TRANSP RX)
  tx_dm_olt:    { refId: A }   # DM4370 ten-gig-1/1/2 Bits sent (OLT TX)
  rx_dm_olt:    { refId: B }   # DM4370 ten-gig-1/1/2 Bits received (OLT RX)
  tx_olt_rb:    { refId: E }   # OLT porta RB750 TX
  rx_olt_rb:    { refId: F }   # OLT porta RB750 RX
  tx_olt_loja:  { refId: G }   # OLT porta Loja TX
  rx_olt_loja:  { refId: H }   # OLT porta Loja RX
  icmp_transporte: { refId: I }
  icmp_dm:      { refId: J }
  icmp_olt:     { refId: K }
  icmp_rb750:   { refId: L }
  icmp_loja:    { refId: M }
