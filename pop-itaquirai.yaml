# POP Itaquiraí - Flow Panel Config
# Gerado para andrewbmchugh-flow-panel

gradientMode: false
animationDurationSecs: 3

cells:

  # ─── NODES ───────────────────────────────────────────

  node_transporte_box:
    label:
      separator: ":"
    dataRef: icmp_transporte
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_dm4370_box:
    label:
      separator: ":"
    dataRef: icmp_dm
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_olt_box:
    label:
      separator: ":"
    dataRef: icmp_olt
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_rb750_box:
    label:
      separator: ":"
    dataRef: icmp_rb750
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_loja_box:
    label:
      separator: ":"
    dataRef: icmp_loja
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  # ─── LINKS ───────────────────────────────────────────

  link_transporte_dm:
    dataRef: tx_transp
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  link_dm_olt:
    dataRef: tx_dm_olt
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 7000000000 }
        - { color: "#dc2626", level: 9000000000 }

  link_olt_rb750:
    dataRef: tx_olt_rb
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  link_olt_loja:
    dataRef: tx_olt_loja
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  # ─── LABELS ──────────────────────────────────────────

  label_transporte_dm:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_transp, rx_transp]

  label_dm_olt:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_dm_olt, rx_dm_olt]

  label_olt_rb750:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_rb, rx_olt_rb]

  label_olt_loja:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_loja, rx_olt_loja]

# ─── DATA MAPPINGS ─────────────────────────────────────
# Nome das séries = legendFormat configurado nas queries do Grafana

dataRefs:
  tx_transp:       { seriesName: "tx_transp" }
  rx_transp:       { seriesName: "rx_transp" }
  tx_dm_olt:       { seriesName: "tx_dm_olt" }
  rx_dm_olt:       { seriesName: "rx_dm_olt" }
  tx_olt_rb:       { seriesName: "tx_olt_rb" }
  rx_olt_rb:       { seriesName: "rx_olt_rb" }
  tx_olt_loja:     { seriesName: "tx_olt_loja" }
  rx_olt_loja:     { seriesName: "rx_olt_loja" }
  icmp_transporte: { seriesName: "icmp_transporte" }
  icmp_dm:         { seriesName: "icmp_dm" }
  icmp_olt:        { seriesName: "icmp_olt" }
  icmp_rb750:      { seriesName: "icmp_rb750" }
  icmp_loja:       { seriesName: "icmp_loja" }
