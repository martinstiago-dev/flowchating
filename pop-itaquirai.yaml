# POP Itaquiraí - Flow Panel Config
# andrewbmchugh-flow-panel
# dataRefs mapeados pelo nome exato da série (displayNameFromDS)

gradientMode: false
animationDurationSecs: 3

cells:

  node_transporte_box:
    dataRef: icmp_transporte
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_dm4370_box:
    dataRef: icmp_dm
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_olt_box:
    dataRef: icmp_olt
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_rb750_box:
    dataRef: icmp_rb750
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  node_loja_box:
    dataRef: icmp_loja
    colorize:
      thresholds:
        - { color: "#16a34a", level: 0 }
        - { color: "#ca8a04", level: 0.5 }
        - { color: "#dc2626", level: 1 }

  link_transporte_dm:
    dataRef: tx_transp
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  link_dm_olt:
    dataRef: tx_dm_olt
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 7000000000 }
        - { color: "#dc2626", level: 9000000000 }

  link_olt_rb750:
    dataRef: tx_olt_rb
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  link_olt_loja:
    dataRef: tx_olt_loja
    colorize:
      thresholds:
        - { color: "#2dd4bf", level: 0 }
        - { color: "#ca8a04", level: 700000000 }
        - { color: "#dc2626", level: 900000000 }

  label_transporte_dm:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_transp, rx_transp]

  label_dm_olt:
    label:
      units: Mbps
      decimalPoints: 1
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_dm_olt, rx_dm_olt]

  label_olt_rb750:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_rb, rx_olt_rb]

  label_olt_loja:
    label:
      units: Mbps
      decimalPoints: 2
      valueFactor: 0.000001
      separator: " / "
      dataRefs: [tx_olt_loja, rx_olt_loja]

# Nome exato das séries conforme retornado pelo Zabbix datasource
dataRefs:
  tx_dm_olt:
    seriesMatch: "Interface ten-gigabit-ethernet-1/1/2(OLT-NOKIA): Bits sent"
  rx_dm_olt:
    seriesMatch: "Interface ten-gigabit-ethernet-1/1/2(OLT-NOKIA): Bits received"
  tx_transp:
    seriesMatch: "Interface ten-gigabit-ethernet-1/1/4(TRANSP ALT ITQ-NV): Bits sent"
  rx_transp:
    seriesMatch: "Interface ten-gigabit-ethernet-1/1/4(TRANSP ALT ITQ-NV): Bits received"
  tx_olt_rb:
    seriesMatch: "/.*(Bits sent).*/"
  rx_olt_rb:
    seriesMatch: "/.*(Bits received).*/"
  tx_olt_loja:
    seriesMatch: "/.*(Bits sent).*/"
  rx_olt_loja:
    seriesMatch: "/.*(Bits received).*/"
  icmp_transporte:
    seriesMatch: "ICMP ping"
  icmp_dm:
    seriesMatch: "ICMP ping"
  icmp_olt:
    seriesMatch: "ICMP ping"
  icmp_rb750:
    seriesMatch: "ICMP ping"
  icmp_loja:
    seriesMatch: "ICMP ping"
