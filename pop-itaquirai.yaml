---
cellIdPreamble: ""
gradientMode: "none"
animationDurationSecs: 2

cells:
  # ===============================
  # STATUS DOS NODES
  # ICMP ping normalmente: 1 = UP, 0 = DOWN.
  # Verde em 1, vermelho em 0.
  # ===============================
  node_transporte_box:
    dataRef: status_transporte
    fillColor:
      thresholds:
        - {color: "#450a0a", level: 0}
        - {color: "#0f2744", level: 1}
    strokeColor:
      thresholds:
        - {color: "#ef4444", level: 0}
        - {color: "#2563eb", level: 1}

  node_dm4370_box:
    dataRef: status_dm4370
    fillColor:
      thresholds:
        - {color: "#450a0a", level: 0}
        - {color: "#0d2218", level: 1}
    strokeColor:
      thresholds:
        - {color: "#ef4444", level: 0}
        - {color: "#16a34a", level: 1}

  node_olt_box:
    dataRef: status_olt
    fillColor:
      thresholds:
        - {color: "#450a0a", level: 0}
        - {color: "#0d2218", level: 1}
    strokeColor:
      thresholds:
        - {color: "#ef4444", level: 0}
        - {color: "#16a34a", level: 1}

  node_rb750_box:
